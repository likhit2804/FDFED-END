name: urbanease

services:
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: urbanease-server
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: DEVELOPMENT
      JWT_SECRET: ${JWT_SECRET:-urbanease-dev-jwt-secret-min-32-chars}
      MONGO_URI1: ${MONGO_URI1:-mongodb://mongodb:27017/urbanEase}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      EMAIL_USER: ${EMAIL_USER:-local@example.com}
      EMAIL_PASS: ${EMAIL_PASS:-local-password}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-http://localhost:5173}
      API_KEYS: ${API_KEYS:-ue-demo-api-key-2024}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./Server:/app
      - server_node_modules:/app/node_modules
      - server_uploads:/app/uploads
    command: npm run dev
    restart: unless-stopped

  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: urbanease-client
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    environment:
      VITE_PROXY_TARGET: http://server:3000
    depends_on:
      - server
    volumes:
      - ./Client:/app
      - client_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: urbanease-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: urbanease-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

volumes:
  server_node_modules:
  client_node_modules:
  server_uploads:
  redis_data:
  mongo_data:
