name: UrbanEase CI

on:
  push:
    branches: [main, dev, dev-endreview]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0 # You can change this to match your production version
        ports:
          - 27017:27017
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Server/package-lock.json'
      
      - name: Install Server dependencies
        run: npm install
        working-directory: Server
      
      - name: Run tests
        run: npm test
        working-directory: Server
        env:
          JWT_SECRET: ci-test-secret-key
          NODE_ENV: test
          # Point the app to the temporary GitHub database!
          MONGO_URI: mongodb://localhost:27017/urbanease_test
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-report
          path: Server/test-report.json

  build:
    name: Build React Client
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Client/package-lock.json'
      
      - name: Install Client dependencies
        run: npm install
        working-directory: Client
      
      - name: Build
        run: npm run build
        working-directory: Client